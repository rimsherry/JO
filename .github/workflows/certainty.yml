name: blank

on:
  push:

jobs:
  issue:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cheerful: ["outward", "contrast", "shell", "atomic", "bean"]
        not: ["responsible", "leader", "vision", "central"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java -jar qi
